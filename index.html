
<style>
.music-panel{background:linear-gradient(145deg,#071426,#0d1f3a,#13294b);border-radius:10px;padding:18px;position:relative;overflow:hidden;box-shadow:0 0 18px rgba(56,189,248,.18);} 
.music-panel::before{content:'';position:absolute;inset:0;padding:1px;border-radius:10px;background:linear-gradient(90deg,#ff00cc,#00ffff,#ffffff,#7dd3fc,#7c3aed,#ff00cc);background-size:300% 100%;animation:musicGlow 6s linear infinite;-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;}
.music-btn{width:52px;height:52px;border:none;border-radius:50%;background:linear-gradient(135deg,#38bdf8,#2563eb);color:white;font-size:20px;cursor:pointer;display:block;margin:0 auto 14px;}
.music-progress-wrap{height:8px;background:rgba(255,255,255,.08);border-radius:99px;overflow:hidden;cursor:pointer;margin-bottom:12px;}
.music-progress{height:100%;width:0%;background:linear-gradient(90deg,#00ffff,#7dd3fc,#ffffff);} 
#volumeSlider{width:100%;accent-color:#38bdf8;}
.music-time{display:flex;justify-content:space-between;font-size:12px;color:#dbeafe;}
@keyframes musicGlow{0%{background-position:0% 50%;}100%{background-position:300% 50%;}}
</style>

<div class="music-panel">
  <audio id="themeAudio" loop>
    <source src="mycastletown.mp3" type="audio/mpeg">
  </audio>
  <button class="music-btn" id="playBtn">▶</button>
  <div class="music-progress-wrap"><div class="music-progress" id="progressBar"></div></div>
  <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="1">
  <div class="music-time"><span id="currentTime">0:00</span><span id="duration">0:00</span></div>
</div>

<script>
const audio=document.getElementById('themeAudio');
const playBtn=document.getElementById('playBtn');
const progress=document.getElementById('progressBar');
const current=document.getElementById('currentTime');
const duration=document.getElementById('duration');
const volume=document.getElementById('volumeSlider');
playBtn.addEventListener('click',()=>{if(audio.paused){audio.play();playBtn.textContent='❚❚';}else{audio.pause();playBtn.textContent='▶';}});
audio.addEventListener('loadedmetadata',()=>duration.textContent=format(audio.duration));
audio.addEventListener('timeupdate',()=>{const pct=(audio.currentTime/audio.duration)*100;progress.style.width=pct+'%';current.textContent=format(audio.currentTime);});
document.querySelector('.music-progress-wrap').addEventListener('click',(e)=>{const rect=e.currentTarget.getBoundingClientRect();audio.currentTime=((e.clientX-rect.left)/rect.width)*audio.duration;});
volume.addEventListener('input',()=>audio.volume=volume.value);
function format(s){const m=Math.floor(s/60);const sec=Math.floor(s%60).toString().padStart(2,'0');return `${m}:${sec}`;}
</script>
```

Replace `YOURSONG.mp3` with your song file.
